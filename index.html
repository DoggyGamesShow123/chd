<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sega Saturn BIN/CUE → CHD Converter</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>
<body>

<div id="container">
    <h2>Sega Saturn CHD Converter</h2>
    <p>Upload your .cue and .bin files to convert them to CHD.</p>

    <input type="file" id="cueInput" accept=".cue">
    <input type="file" id="binInput" accept=".bin">
    <button id="convertBtn">Convert</button>

    <p id="status"></p>
</div>

</body>
</html>
