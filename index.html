<!DOCTYPE html>
<html>
<head>
    <title>Sega Saturn BIN/CUE → CHD Converter</title>
    <style>
        body { font-family: Arial; margin: 40px; }
        .box {
            border: 2px dashed #888;
            padding: 20px;
            width: 350px;
            margin: auto;
            text-align: center;
            border-radius: 10px;
        }
        input { margin: 10px; }
    </style>
</head>
<body>

<h1>Sega Saturn CHD Converter</h1>

<div class="box">
    <form action="/upload" method="post" enctype="multipart/form-data">
        <p><strong>Select your files:</strong></p>
        <input type="file" name="cuefile" accept=".cue" required><br>
        <input type="file" name="binfile" accept=".bin" required><br><br>
        <button type="submit">Convert to CHD</button>
    </form>
</div>

</body>
</html>
